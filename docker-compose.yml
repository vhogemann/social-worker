services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialworker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8101:8080"
    environment:
      LLM__BaseUrl: https://openrouter.ai/api/v1
      LLM__ApiKey: ${LLM__ApiKey}
      LLM__Model: ${LLM__Model:-anthropic/claude-3.5-sonnet}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Database=socialworker;Username=postgres;Password=postgres
      Auth__JwtSecret: ${Auth__JwtSecret}
      Auth__AdminPassword: ${Auth__AdminPassword:-changeme}
      Auth__AccessTokenLifetimeMinutes: ${Auth__AccessTokenLifetimeMinutes:-60}
      Auth__RefreshTokenLifetimeDays: ${Auth__RefreshTokenLifetimeDays:-7}
      Auth__DbEncryptionKey: ${Auth__DbEncryptionKey:-}
      Search__Provider: ${Search__Provider:-SearXng}
      Search__BraveApiKey: ${Search__BraveApiKey:-}
      Search__SearXngBaseUrl: http://searxng:8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./SYSTEM_PROMPT.md:/app/SYSTEM_PROMPT.md:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8100:80"
    depends_on:
      - api
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    restart: unless-stopped

  e2e:
    profiles:
      - e2e
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      BASE_URL: http://web:80
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${Auth__AdminPassword:-changeme}
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    volumes:
      - ./e2e/reports:/e2e/reports
      - ./e2e/screenshots:/e2e/screenshots
      - ./e2e/output:/e2e/output

  web-test:
    image: node:22-alpine
    working_dir: /app
    entrypoint: ["npx"]
    command: ["vitest", "run"]
    volumes:
      - ./web:/app
    profiles:
      - tooling

  dotnet:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src/SocialWorker.Api
    entrypoint: ["dotnet"]
    command: ["--info"]
    volumes:
      - ./api:/src
    profiles:
      - tooling

volumes:
  pgdata: